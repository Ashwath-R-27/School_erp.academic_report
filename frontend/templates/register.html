<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <title>Register</title>
    <style>
        body{
            margin: 0;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .content{
            flex: 1;
            display: grid;
            place-items: center;
            padding: clamp(10px,4vw,20px);
        }
        .login-box{
            width: 60%;
            padding: clamp(8px,4vw,16px);
            border: 1px solid rgb(54, 54, 54);
            border-radius: 10px;
            box-shadow: 0px 0px 10px -1px black;
        }
        #box-header{
            text-align: center;
            display: grid;
            font-size: clamp(17px, 4vw, 22px);
            color: rgb(33, 25, 136);
            font-weight: bold;
        }
        .input-box { position: relative; margin-bottom: 1.5rem; }

        .input-box input {
            width: 100%; box-sizing: border-box;
            padding: 12px 16px 8px;
            font-size: 15px;
            background: #fff;
            border: 1.5px solid #ccc;
            border-radius: 10px;
            height: 45px;
            outline: none;
            transition: border-color 0.22s, box-shadow 0.22s;
        }

        .input-box input:focus {
            border-color: #534AB7;
            box-shadow: 0 0 0 3.5px rgba(83,74,183,0.13);
        }

        .input-box label {
            position: absolute;
            left: 17px; top: 50%;
            transform: translateY(-50%);
            font-size: 14.5px;
            color: #888;
            pointer-events: none;
            background: #fff;
            padding: 0 3px;
            transition: top 0.2s, font-size 0.2s, color 0.2s, transform 0.2s;
        }

        /* Floated state — triggered by focus OR filled value */
        .input-box input:focus ~ label,
        .input-box input:not(:placeholder-shown) ~ label {
            top: 0;
            transform: translateY(-50%);
            font-size: 11.5px;
            font-weight: 500;
            color: #534AB7;
        }
        .input-box input.has-eye {
            padding-right: 48px;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: #aaa;
            font-size: 19px;
            display: flex;
            align-items: center;
            border-radius: 6px;
            outline: none;
            transition: color 0.2s;
        }

        .eye-btn:hover { color: #534AB7; }
        .input-box input:focus ~ label ~ .eye-btn { color: #534AB7; }
        .eye-btn:focus-visible { box-shadow: 0 0 0 3px rgba(83,74,183,0.2); }
        .btn{
            display: grid;
            place-items: center;
        }
        #login-btn{
            width: 95%;
        }
        .input-box {
            margin-bottom: 1.5rem;
        }

        .input-box .field-wrap {
            position: relative;
        }
        table{
            width: 100%;
        }
        table td button{
            padding: 10px;
            background: blueviolet;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        table td button:hover{
            background: rgb(66, 21, 109);
        }
        .field-msg {
            display: none;
            font-size: 12px;
            font-style: italic;
            margin-top: 4px;
            padding-left: 4px;
        }
        @media screen and (max-width:700px){
            .login-box{
                width: 95%;
            }
        }
    </style>
</head>
<body>
    {{ header_div | safe }}
    <div class="content">
        <div class="login-box">
            <form action="" method="post">
                <div id="box-header">REGISTER</div>
                <hr>
                <div class="input-box">
                    <div class="field-wrap">
                        <input type="text" id="name" required placeholder=" " />
                        <label for="name">Full Name</label>
                    </div>
                    <span class="field-msg" id="err-name"></span>
                </div>
                <div class="input-box">
                    <div class="field-wrap">
                        <input type="text" id="un" required placeholder=" " />
                        <label for="un">Username</label>
                    </div>
                    <span class="field-msg" id="err-name"></span>
                </div>
                <div class="input-box">
                    <div class="field-wrap">
                        <input type="password" id="pwd" required placeholder=" " class="has-eye" />
                        <label for="pwd">Enter Password</label>
                        <button class="eye-btn" id="eye-btn-1" type="button" aria-label="Show password">
                            <i class="ti ti-eye" id="eye-icon-1" aria-hidden="true"></i>
                        </button>
                    </div>
                    <span class="field-msg" id="err-pwd"></span>
                </div>

                <div class="input-box">
                    <div class="field-wrap">
                        <input type="password" id="conpwd" required placeholder=" " class="has-eye" />
                        <label for="conpwd">Retype Password</label>
                        <button class="eye-btn" id="eye-btn-2" type="button" aria-label="Show password">
                            <i class="ti ti-eye" id="eye-icon-2" aria-hidden="true"></i>
                        </button>
                    </div>
                    <span class="field-msg" id="err-conpwd"></span>
                </div>
                <div class="input-box">
                    <table>
                        <td>
                            <div class="field-wrap">
                                <input type="email" id="em" required placeholder=" " />
                                <label for="em">Email</label>
                            </div>
                            <span class="field-msg" id="err-name"></span>
                        </td>
                        <td><button type="button">Send OTP</button></td>
                    </table>
                </div>
                <div class="btn">
                    <button type="submit" id="login-btn">REGISTER</button>
                </div>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static',filename='registerscr.js') }}"></script>
</body>
</html>
