<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='inputstyles.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <title>Register</title>
</head>
<body>
    {{ header_div | safe }}
    <div class="content">
        <div class="form-container">
            <form action="" method="post">
                <div id="box-header">REGISTER</div>
                <hr>
                <div class="input-box">
                    <div class="field-wrap">
                        <input type="text" id="name" required placeholder=" " />
                        <label for="name">Full Name</label>
                    </div>
                    <span class="field-msg" id="err-name"></span>
                </div>
                <div class="input-box">
                    <div class="field-wrap">
                        <input type="text" id="un" required placeholder=" " />
                        <label for="un">Username</label>
                    </div>
                    <span class="field-msg" id="err-name"></span>
                </div>
                <div class="input-box">
                    <div class="field-wrap">
                        <input type="password" id="pwd" required placeholder=" " class="has-eye" />
                        <label for="pwd">Enter Password</label>
                        <button class="eye-btn" id="eye-btn-1" type="button" aria-label="Show password">
                            <i class="ti ti-eye" id="eye-icon-1" aria-hidden="true"></i>
                        </button>
                    </div>
                    <span class="field-msg" id="err-pwd"></span>
                </div>

                <div class="input-box">
                    <div class="field-wrap">
                        <input type="password" id="conpwd" required placeholder=" " class="has-eye" />
                        <label for="conpwd">Retype Password</label>
                        <button class="eye-btn" id="eye-btn-2" type="button" aria-label="Show password">
                            <i class="ti ti-eye" id="eye-icon-2" aria-hidden="true"></i>
                        </button>
                    </div>
                    <span class="field-msg" id="err-conpwd"></span>
                </div>
                <div class="input-box">
                    <table>
                        <td>
                            <div class="field-wrap">
                                <input type="email" id="em" required placeholder=" " />
                                <label for="em">Email</label>
                            </div>
                            <span class="field-msg" id="err-name"></span>
                        </td>
                        <td><button type="button">Send OTP</button></td>
                    </table>
                </div>
                <div class="btn">
                    <button type="submit" id="login-btn">REGISTER</button>
                </div>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static',filename='registerscr.js') }}"></script>
</body>
</html>
