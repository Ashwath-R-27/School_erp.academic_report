<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <title>Login</title>
    <style>
        body{
            margin: 0;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .content{
            flex: 1;
            display: grid;
            place-items: center;
            padding: clamp(10px,4vw,20px);
        }
        .login-box{
            width: 60%;
            padding: clamp(8px,4vw,16px);
            border: 1px solid rgb(54, 54, 54);
            border-radius: 10px;
            box-shadow: 0px 0px 10px -1px black;
        }
        #box-header{
            text-align: center;
            display: grid;
            font-size: clamp(17px, 4vw, 22px);
            color: rgb(33, 25, 136);
            font-weight: bold;
        }
        .input-box { position: relative; margin-bottom: 1.5rem; }

        .input-box input {
            width: 100%; box-sizing: border-box;
            padding: 12px 16px 8px;
            font-size: 15px;
            background: #fff;
            border: 1.5px solid #ccc;
            border-radius: 10px;
            height: 45px;
            outline: none;
            transition: border-color 0.22s, box-shadow 0.22s;
        }

        .input-box input:focus {
            border-color: #534AB7;
            box-shadow: 0 0 0 3.5px rgba(83,74,183,0.13);
        }

        .input-box label {
            position: absolute;
            left: 17px; top: 50%;
            transform: translateY(-50%);
            font-size: 14.5px;
            color: #888;
            pointer-events: none;
            background: #fff;
            padding: 0 3px;
            transition: top 0.2s, font-size 0.2s, color 0.2s, transform 0.2s;
        }

        /* Floated state — triggered by focus OR filled value */
        .input-box input:focus ~ label,
        .input-box input:not(:placeholder-shown) ~ label {
            top: 0;
            transform: translateY(-50%);
            font-size: 11.5px;
            font-weight: 500;
            color: #534AB7;
        }
        .input-box input.has-eye {
            padding-right: 48px;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: #aaa;
            font-size: 19px;
            display: flex;
            align-items: center;
            border-radius: 6px;
            outline: none;
            transition: color 0.2s;
        }

        .eye-btn:hover { color: #534AB7; }
        .input-box input:focus ~ label ~ .eye-btn { color: #534AB7; }
        .eye-btn:focus-visible { box-shadow: 0 0 0 3px rgba(83,74,183,0.2); }
        .btn{
            display: grid;
            place-items: center;
        }
        #login-btn{
            width: 95%;
        }
        table td {
            font-style: italic;
        }
        table td a{
            text-decoration: none;
            color: blue;
        }
        table td a:hover{
            text-decoration: underline;
        }
        @media screen and (max-width:700px){
            .login-box{
                width: 95%;
            }
        }
    </style>
</head>
<body>
    {{ header_div | safe }}
    <div class="content">
        <div class="login-box">
            <form action="" method="post">
                <div id="box-header">LOGIN</div>
                <hr>
                <div class="input-box">
                    <input type="text" id="name" required placeholder=" " />
                    <label for="name">Username</label>
                </div>
                <div class="input-box">
                    <input type="password" id="pwd" required placeholder=" " class="has-eye" />
                    <label for="pwd">Password</label>
                    <button class="eye-btn" id="eye-btn" type="button" aria-label="Show password">
                        <i class="ti ti-eye" id="eye-icon" aria-hidden="true"></i>
                    </button>
                </div>
                <div class="options">
                    <table style="width: 100%;">
                        <tr><td>New User? <a href="/register">Register</a></td><td style="text-align: right;"><a href="#">Forget Password ?</a></td></tr>
                    </table>
                </div>
                <div class="btn">
                    <button type="submit" id="login-btn">LOGIN</button>
                </div>
            </form>
        </div>
    </div>
    <script>
    const input = document.getElementById('pwd');
    const btn   = document.getElementById('eye-btn');
    const icon  = document.getElementById('eye-icon');

    btn.addEventListener('click', () => {
        const hide = input.type === 'password';
        input.type = hide ? 'text' : 'password';
        icon.className = hide ? 'ti ti-eye-off' : 'ti ti-eye';
        btn.setAttribute('aria-label', hide ? 'Hide password' : 'Show password');
        input.focus();
    });
</script>
</body>
</html>
